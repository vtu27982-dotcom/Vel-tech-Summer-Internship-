<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact.css">

</head>
<body>

    <div class="contact-container">

        <h1>📞 Contact Us</h1>

        <p class="info">
            Need help with your bus booking? Contact our support team.
        </p>

        <div class="contact-details">
            <p><strong>📍 Address:</strong> Chennai, Tamil Nadu, India</p>
            <p><strong>📞 Helpline:</strong> +91 98765 43210</p>
            <p><strong>☎ Customer Care:</strong> 1800-123-4567</p>
            <p><strong>📧 Email:</strong> support@busbooking.com</p>
        </div>

        <h2>Send Message</h2>

        <form action="sent message.html">

            <input type="text"
                   placeholder="Enter Your Name"
                   required>

            <input type="email"
                   placeholder="Enter Your Email"
                   required>

            <textarea
                rows="5"
                placeholder="Enter Your Message"
                required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

        <br>

        <a href="index.html">
            <button class="home-btn">
                🏠 Back to Home
            </button>
        </a>

    </div>

</body>
</html>
